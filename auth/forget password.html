<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>YOVI — Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/forget password.css" />
</head>
<body>

  <div class="page-wrapper">

    <!-- ── Lock icon ── -->
    <div class="lock-icon-wrap">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
           stroke="#d97706" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <!-- ── Heading ── -->
    <h1 class="main-heading">Forgot your password?</h1>

    <!-- ── Subtext ── -->
    <p class="main-sub">
      No worries. Enter your email and we'll send you<br />
      a reset link right away.
    </p>

    <!-- ── White card ── -->
    <div class="fp-card">
      <form id="forgotForm" novalidate>

        <!-- Email address field -->
        <div class="field-group">
          <label class="field-label" for="emailInput">Email address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <!-- Envelope icon -->
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                   stroke="#6b7280" stroke-width="1.9"
                   stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M2 7l10 7 10-7"/>
              </svg>
            </span>
            <input
              type="email"
              id="emailInput"
              class="fp-input"
              placeholder="adaeze@example.com"
              autocomplete="email"
              inputmode="email"
            />
          </div>
          <p class="field-hint">We'll send the reset link to this email address.</p>
        </div>

        <!-- Send Reset Link button -->
         
        <button type="submit" class="btn-send" id="sendBtn">
          Send Reset Link
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.4"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
        </form>

      </form>
    </div>

    <!-- ── Back to login ── -->
    <a href="/auth/login.html" class="back-link" id="backBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.3"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back to login
    </a>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/forget password.js"></script>
</body>
</html>
