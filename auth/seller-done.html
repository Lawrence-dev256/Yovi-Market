<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Seller Setup Complete </title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Global CSS -->
    <link rel="stylesheet"
          href="../assets/css/style.css">

</head>

<body>

<!-- ==========================================
SELLER DONE PAGE
========================================== -->

<section id="ysdDonePage"
         class="ysd-page-wrapper">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-xl-5
                        col-lg-6
                        col-md-8
                        col-sm-10">

                <!-- ==================================
                     BRAND LOGO PLACEHOLDER
                =================================== -->

                <div class="ysd-brand-wrapper text-center">

                    <div class="ysd-brand-placeholder">

                        <!--
                            Replace with your logo:

                            <img src="assets/images/logo.png"
                                 alt="YOVI Logo"
                                 class="img-fluid">
                        -->

                    </div>

                </div>

                <!-- ==================================
                     SUCCESS ILLUSTRATION
                =================================== -->

                <div class="ysd-success-image-wrapper text-center">

                    <div class="ysd-success-image-placeholder">

                        <i class="bi bi-shop"></i>

                    </div>

                </div>

                <!-- ==================================
                     SUCCESS BADGE
                =================================== -->

                <div class="text-center">

                    <span id="ysdAccountStatus"
                          class="ysd-success-badge">

                        <i class="bi bi-check-circle-fill me-2"></i>

                        Account setup complete

                    </span>

                </div>

                <!-- ==================================
                     PAGE HEADER
                =================================== -->

                <header class="ysd-header text-center">

                    <h1 class="ysd-page-title">

                        Your store is live!

                    </h1>

                    <p class="ysd-page-subtitle">

                        Start listing your products and reach buyers across Nigeria today.

                    </p>

                </header>

                <!-- ==================================
                     SUCCESS CARD
                =================================== -->

                <div class="card ysd-success-card">

                    <div class="card-body">

                        <!-- ==========================
                             SUCCESS FEATURES
                        =========================== -->

                        <div class="row text-center g-3 ysd-feature-row">

                            <!-- Escrow Active -->

                            <div class="col-4">

                                <div class="ysd-feature-item">

                                    <div class="ysd-feature-icon ysd-feature-success">

                                        <i class="bi bi-shield-check"></i>

                                    </div>

                                    <h6 class="ysd-feature-title">

                                        Escrow active

                                    </h6>

                                </div>

                            </div>

                            <!-- Profile Created -->

                            <div class="col-4">

                                <div class="ysd-feature-item">

                                    <div class="ysd-feature-icon ysd-feature-primary">

                                        <i class="bi bi-check2-circle"></i>

                                    </div>

                                    <h6 class="ysd-feature-title">

                                        Profile created

                                    </h6>

                                </div>

                            </div>

                            <!-- Alerts Ready -->

                            <div class="col-4">

                                <div class="ysd-feature-item">

                                    <div class="ysd-feature-icon ysd-feature-purple">

                                        <i class="bi bi-bell"></i>

                                    </div>

                                    <h6 class="ysd-feature-title">

                                        Alerts ready

                                    </h6>

                                </div>

                            </div>

                        </div>

                        <!-- ==========================
                             PRIMARY ACTIONS
                        =========================== -->

                        <div class="ysd-action-group">

                            <a href="../navigation/products.html">

                            <button
                                type="button"
                                id="ysdAddFirstProductBtn"
                                class="btn ysd-btn-primary w-100">

                                Add First Product

                                <i class="bi bi-arrow-right ms-2"></i>

                            </button>

                            </a>

                            <a href="../seller/seller-dashboard.html">

                            <button
                                type="button"
                                id="ysdViewDashboardBtn"
                                class="btn ysd-btn-outline w-100 mt-3">

                                View Dashboard

                                <i class="bi bi-arrow-right ms-2"></i>

                            </button>

                            </a>

                        </div>

                    </div>

                </div>

                <!-- ==================================
                     FOOTER NAVIGATION
                =================================== -->

                <div class="ysd-footer-links text-center">

                    <a href="../navigation/home.html">

                    <button
                        type="button"
                        id="ysdBackHomeBtn"
                        class="ysd-footer-link">

                        <i class="bi bi-arrow-left me-1"></i>

                        Back to Home

                    </button>

                    </a>

                    <span class="ysd-footer-divider">

                        •

                    </span>

                    <a href="../navigation/notification.html">

                    <button
                        type="button"
                        id="ysdViewNotificationsBtn"
                        class="ysd-footer-link">

                        View Notifications

                    </button>

                    </a>

                </div>

                <!-- ==================================
                     HIDDEN NAVIGATION INPUTS
                     Used by seller-done.js
                =================================== -->

                <input
                    type="hidden"
                    id="ysdDashboardPage"
                    value="seller-dashboard.html">

                <input
                    type="hidden"
                    id="ysdAddProductPage"
                    value="seller-add-product.html">

                <input
                    type="hidden"
                    id="ysdHomePage"
                    value="index.html">

                <input
                    type="hidden"
                    id="ysdNotificationPage"
                    value="notifications.html">

                <input
                    type="hidden"
                    id="ysdAccountRole"
                    value="seller">

                <input
                    type="hidden"
                    id="ysdSetupStatus"
                    value="completed">

                <input
                    type="hidden"
                    id="ysdCurrentPage"
                    value="seller-done">

            </div>

        </div>

    </div>

    <!-- ==========================================
         PAGE LOADER
    =========================================== -->

    <div id="ysdPageLoader">

        <div class="spinner-border text-success"
             role="status">

            <span class="visually-hidden">

                Loading...

            </span>

        </div>

    </div>

    <!-- ==========================================
         SUCCESS TOAST
    =========================================== -->

    <div id="ysdToast"
         class="toast align-items-center border-0"
         role="alert"
         aria-live="assertive"
         aria-atomic="true">

        <div class="d-flex">

            <div id="ysdToastMessage"
                 class="toast-body">

                Seller account created successfully.

            </div>

            <button
                type="button"
                class="btn-close btn-close-white me-2 m-auto"
                data-bs-dismiss="toast"
                aria-label="Close">

            </button>

        </div>

    </div>

    <!-- ==========================================
         CONFETTI CONTAINER
    =========================================== -->

    <div id="ysdConfettiContainer"
         aria-hidden="true">

    </div>

</section>

<!-- Bootstrap Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Global JavaScript -->
<script src="../assets/js/seller-done.js"></script>

</body>

</html>
