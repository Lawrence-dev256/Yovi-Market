<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Reset Success</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

      <!-- CUSTOM CSS LINK -->
       <link rel="stylesheet" href="../assets/css/account_secured.css">

</head>
<body>

<div class="page-wrapper">

    <div class="success-icon-wrapper">

        <div class="success-circle-bg">
            <div class="success-check">✓</div>
        </div>

        <div class="lock-badge">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M7 10V7a5 5 0 0 1 10 0v3" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <rect x="5" y="10" width="14" height="10" rx="2" stroke="white" stroke-width="2"/>
            </svg>
        </div>

    </div>

    <h1>Password reset!</h1>

    <div class="description">
        Your password has been successfully updated.<br>
        You can now sign in with your new password.
    </div>

    <div class="success-card">

        <div class="secured-box">

            <svg class="secured-icon" viewBox="0 0 24 24" fill="none">
                <path d="M12 3L19 6V11C19 16 15.5 20 12 21C8.5 20 5 16 5 11V6L12 3Z"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linejoin="round"/>
            </svg>

            <div>
                <div class="secured-title">Account secured</div>
                <div class="secured-text">
                    Your YOVI account is protected with your new password.
                </div>
            </div>

        </div>

        <a href="../auth/login.html">

        <button class="signin-btn">
            Sign in to YOVI
            <span class="arrow">→</span>
        </button>

        </a>

        <div class="footer-note">
            For security, you'll be asked to re-verify any saved devices.
        </div>

    </div>

</div>
<script src="../assets/js/account_secured.js"></script>

</body>
</html>
