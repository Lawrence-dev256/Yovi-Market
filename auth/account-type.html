<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Choose Account Type | YOVI</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- Global CSS -->

    <link rel="stylesheet"
          href="../assets/css/style.css">

</head>

<body>

<main id="yat-account-type-page">

    <!--=========================================
    ACCOUNT TYPE SECTION
    ==========================================-->

    <section class="yat-account-section">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-xl-10 col-lg-11">

                    <!--=====================================
                    LOGO
                    =====================================-->

                    <div class="yat-logo-wrapper text-center">

                        <!-- Replace with your logo later -->

                        <a href="../index.html"
                           class="yat-logo-link">

                            <div class="yat-logo-placeholder">

                                LOGO

                            </div>

                        </a>

                    </div>

                    <!--=====================================
                    STEP PROGRESS
                    =====================================-->

                    <div class="yat-progress-wrapper">

                        <div class="yat-progress">

                            <!-- STEP 1 -->

                            <div class="yat-step yat-step-complete">

                                <div class="yat-step-circle">

                                    <i class="bi bi-check-lg"></i>

                                </div>

                                <span class="yat-step-label">

                                    Account

                                </span>

                            </div>

                            <div class="yat-step-line yat-line-complete"></div>

                            <!-- STEP 2 -->

                            <div class="yat-step yat-step-active">

                                <div class="yat-step-circle">

                                    2

                                </div>

                                <span class="yat-step-label">

                                    Account Type

                                </span>

                            </div>

                            <div class="yat-step-line"></div>

                            <!-- STEP 3 -->

                            <div class="yat-step">

                                <div class="yat-step-circle">

                                    3

                                </div>

                                <span class="yat-step-label">

                                    Profile

                                </span>

                            </div>

                            <div class="yat-step-line"></div>

                            <!-- STEP 4 -->

                            <div class="yat-step">

                                <div class="yat-step-circle">

                                    4

                                </div>

                                <span class="yat-step-label">

                                    Done

                                </span>

                            </div>

                        </div>

                    </div>

                    <!--=====================================
                    PAGE HEADER
                    =====================================-->

                    <header class="yat-header text-center">

                        <h1 class="yat-title">

                            How will you use YOVI?

                        </h1>

                        <p class="yat-subtitle">

                            Choose your account type —
                            you can always add more later.

                        </p>

                    </header>

                    <!--=====================================
                    ACCOUNT TYPE FORM
                    =====================================-->

                    <form id="yatAccountTypeForm">

                        <!--=====================================
                        ACCOUNT TYPE OPTIONS
                        ======================================-->

                        <div class="row g-4">

                            <!--==============================
                            BUYER
                            ==============================-->

                            <div class="col-lg-6">

                                <label class="yat-account-card yat-popular-card">

                                    <input
                                        type="radio"
                                        name="accountType"
                                        value="buyer"
                                        class="yat-account-input"
                                        checked>

                                    <span class="yat-card-badge yat-badge-orange">

                                        Most Popular

                                    </span>

                                    <div class="yat-card-content">

                                        <div class="yat-card-icon">

                                            <!-- Placeholder -->
                                            <img src="../assets/images/placeholders/icon-placeholder.svg"
                                                 alt="Buyer">

                                        </div>

                                        <h3 class="yat-card-title">

                                            Buyer

                                        </h3>

                                        <p class="yat-card-description">

                                            Shop products and discover local services
                                            from verified sellers and providers.

                                        </p>

                                        <ul class="yat-feature-list">

                                            <li>

                                                <i class="bi bi-check-circle"></i>

                                                Browse 500K+ listings

                                            </li>

                                            <li>

                                                <i class="bi bi-check-circle"></i>

                                                Book service providers

                                            </li>

                                            <li>

                                                <i class="bi bi-check-circle"></i>

                                                Escrow protection on all orders

                                            </li>

                                        </ul>

                                    </div>

                                </label>

                            </div>

                            <!--==============================
                            SELLER
                            ==============================-->

                            <div class="col-lg-6">

                                <label class="yat-account-card">

                                    <input
                                        type="radio"
                                        name="accountType"
                                        value="seller"
                                        class="yat-account-input">

                                    <div class="yat-card-content">

                                        <div class="yat-card-icon">

                                            <img src="../assets/images/placeholders/icon-placeholder.svg"
                                                 alt="Seller">

                                        </div>

                                        <h3 class="yat-card-title">

                                            Seller

                                        </h3>

                                        <p class="yat-card-description">

                                            List and sell your products to millions
                                            of buyers across Nigeria.

                                        </p>

                                        <ul class="yat-feature-list">

                                            <li>

                                                <i class="bi bi-check-circle"></i>

                                                Unlimited product listings

                                            </li>

                                            <li>

                                                <i class="bi bi-check-circle"></i>

                                                Built-in escrow payments

                                            </li>

                                            <li>

                                                <i class="bi bi-check-circle"></i>

                                                Sales analytics dashboard

                                            </li>

                                        </ul>

                                    </div>

                                </label>

                            </div>

                        </div>

                        <!--=====================================
                        SECOND ROW
                        ======================================-->

                        <div class="row g-4 mt-1">

                            <!--==============================
                            SERVICE PROVIDER
                            ==============================-->

                            <div class="col-lg-6">

                                <label class="yat-account-card">

                                    <input
                                        type="radio"
                                        name="accountType"
                                        value="service-provider"
                                        class="yat-account-input">

                                    <div class="yat-card-content">

                                        <div class="yat-card-icon">

                                            <!-- Placeholder -->
                                            <img src="../assets/images/placeholders/icon-placeholder.svg"
                                                 alt="Service Provider">

                                        </div>

                                        <h3 class="yat-card-title">

                                            Service Provider

                                        </h3>

                                        <p class="yat-card-description">

                                            Offer professional services and receive
                                            bookings from nearby clients.

                                        </p>

                                        <ul class="yat-feature-list">

                                            <li>

                                                <i class="bi bi-check-circle"></i>

                                                Create your service profile

                                            </li>

                                            <li>

                                                <i class="bi bi-check-circle"></i>

                                                Manage bookings &amp; calendar

                                            </li>

                                            <li>

                                                <i class="bi bi-check-circle"></i>

                                                Earn with escrow protection

                                            </li>

                                        </ul>

                                    </div>

                                </label>

                            </div>

                            <!--==============================
                            BUYER & SELLER
                            ==============================-->

                            <div class="col-lg-6">

                                <label class="yat-account-card">

                                    <input
                                        type="radio"
                                        name="accountType"
                                        value="logistics & rider"
                                        class="yat-account-input">

                                    <span class="yat-card-badge yat-badge-green">

                                        Best for entrepreneurs

                                    </span>

                                    <div class="yat-card-content">

                                        <div class="yat-card-icon">

                                            <!-- Placeholder -->
                                            <img src="../assets/images/placeholders/icon-placeholder.svg"
                                                 alt="Buyer & Seller">

                                        </div>

                                        <h3 class="yat-card-title">

                                            Logistics &amp; rider

                                        </h3>

                                        <p class="yat-card-description">

                                            Deliver products and goods nationwide and earn commission 
                                            <!-- Buy for yourself and also sell your own
                                            products on YOVI. -->

                                        </p>

                                        <ul class="yat-feature-list">

                                            <li>

                                                <i class="bi bi-check-circle"></i>

                                                Full rider + Confirmation access

                                            </li>

                                            <li>

                                                <i class="bi bi-check-circle"></i>

                                                Separate dashboards

                                            </li>

                                            <li>

                                                <i class="bi bi-check-circle"></i>

                                                Switch roles anytime

                                            </li>

                                        </ul>

                                    </div>

                                </label>

                            </div>

                        </div>

                        <!--=====================================
                        CONTINUE BUTTON
                        ======================================-->

                        <div class="yat-action-wrapper">

                            <a href="../auth/profile-setup.html"></a>
                            <button
                                type="submit"
                                id="yatContinueBtn"
                                class="btn yat-continue-btn">

                                <span>

                                    Continue

                                </span>

                                <i class="bi bi-arrow-right ms-2"></i>

                            </button>

                        </div>

                        <!--=====================================
                        FOOTER NOTE
                        ======================================-->

                        <div class="yat-footer-note text-center">

                            <p>

                                You can change your account type anytime from
                                <strong>Settings</strong>

                            </p>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </section>

</main>

<!--=====================================
BOOTSTRAP JAVASCRIPT
======================================-->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!--=====================================
GLOBAL JAVASCRIPT
======================================-->

<script src="../assets/js/account-type.js"></script>

</body>

</html>
