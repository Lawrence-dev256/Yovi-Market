<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ==========================================
         META TAGS
    =========================================== -->

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="description"
          content="Buyer account setup completed successfully">

    <title>Buyer Setup Complete | YOVI</title>

    <!-- ==========================================
         GOOGLE FONT
    =========================================== -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- ==========================================
         BOOTSTRAP CSS
    =========================================== -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Global Styles -->

    <link rel="stylesheet"
          href="../assets/css/style.css">

</head>

<body>

<!-- ==========================================
     BUYER DONE PAGE
=========================================== -->

<section id="ybdDonePage">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-xl-6 col-lg-7 col-md-9 col-sm-11">

                <!-- ==================================
                     PAGE WRAPPER
                =================================== -->

                <div class="ybd-page-wrapper text-center">

                    <!-- ==================================
                         BRAND PLACEHOLDER
                    =================================== -->

                    <div class="ybd-brand-wrapper">

                        <div class="ybd-brand-placeholder">

                            <span>

                                LOGO

                            </span>

                        </div>

                    </div>

                    <!-- ==================================
                         SUCCESS ILLUSTRATION
                    =================================== -->

                    <div class="ybd-success-image-wrapper">

                        <div class="ybd-success-image-placeholder">

                            <!-- Replace with your own image later -->

                            <i class="bi bi-image"></i>

                        </div>

                    </div>

                    <!-- ==================================
                         SUCCESS BADGE
                    =================================== -->

                    <div class="ybd-success-badge">

                        <i class="bi bi-check-circle-fill"></i>

                        <span id="ybdAccountStatus">

                            Account setup complete

                        </span>

                    </div>

                    <!-- ==================================
                         PAGE HEADER
                    =================================== -->

                    <div class="ybd-header">

                        <h1 class="ybd-page-title">

                            You're ready to shop!

                        </h1>

                        <p class="ybd-page-subtitle">

                            Discover thousands of verified products
                            and local services near you.

                        </p>

                    </div>

                    <!-- ==================================
                         SUCCESS SUMMARY CARD
                    =================================== -->

                    <div class="card ybd-success-card">

                        <div class="card-body">

                            <!-- ==========================
                                 ACCOUNT BENEFITS
                            =========================== -->

                            <div class="row ybd-feature-row g-4">

                                <!-- Escrow -->

                                <div class="col-4">

                                    <div class="ybd-feature-item">

                                        <div class="ybd-feature-icon ybd-feature-success">

                                            <i class="bi bi-shield-check"></i>

                                        </div>

                                        <h6 class="ybd-feature-title">

                                            Escrow active

                                        </h6>

                                    </div>

                                </div>

                                <!-- Profile -->

                                <div class="col-4">

                                    <div class="ybd-feature-item">

                                        <div class="ybd-feature-icon ybd-feature-primary">

                                            <i class="bi bi-check2-circle"></i>

                                        </div>

                                        <h6 class="ybd-feature-title">

                                            Profile created

                                        </h6>

                                    </div>

                                </div>

                                <!-- Notifications -->

                                <div class="col-4">

                                    <div class="ybd-feature-item">

                                        <div class="ybd-feature-icon ybd-feature-purple">

                                            <i class="bi bi-bell"></i>

                                        </div>

                                        <h6 class="ybd-feature-title">

                                            Alerts ready

                                        </h6>

                                    </div>

                                </div>

                            </div>

                            <!-- ==========================
                                 ACTION BUTTONS
                            =========================== -->

                            <div class="ybd-action-group d-grid gap-3">

                                <button
                                    type="button"
                                    id="ybdBrowseProductsBtn"
                                    class="btn ybd-btn-primary">

                                    <span>

                                        Browse Products

                                    </span>

                                    <i class="bi bi-arrow-right ms-2"></i>

                                </button>

                                <button
                                    type="button"
                                    id="ybdFindServicesBtn"
                                    class="btn ybd-btn-outline">

                                    <span>

                                        Find Services

                                    </span>

                                    <i class="bi bi-arrow-right ms-2"></i>

                                </button>

                            </div>

                        </div>

                    </div>

                    <!-- ==================================
                         FOOTER NAVIGATION
                    =================================== -->

                    <div class="ybd-footer-links">

                        <a href="../index.html">
                            
                        <button
                            type="button"
                            id="ybdBackHomeBtn"
                            class="ybd-footer-link">

                            <i class="bi bi-arrow-left me-2"></i>

                            <span>

                                Back to Home

                            </span>

                        </button>

                        </a>

                        <span class="ybd-footer-divider">

                            •

                        </span>

                        <button
                            type="button"
                            id="ybdViewNotificationsBtn"
                            class="ybd-footer-link">

                            <span>

                                View Notifications

                            </span>

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- ==================================
         HIDDEN PAGE REFERENCES
         Used by buyer-done.js
    =================================== -->

    <input
        type="hidden"
        id="ybdProductsPage"
        value="products.html">

    <input
        type="hidden"
        id="ybdServicesPage"
        value="services.html">

    <input
        type="hidden"
        id="ybdDashboardPage"
        value="buyer-dashboard.html">

    <input
        type="hidden"
        id="ybdAccountRole"
        value="buyer">

    <!-- ==================================
         CONFETTI CONTAINER
    =================================== -->

    <div id="ybdConfettiContainer"></div>

    <!-- ==================================
         PAGE LOADER
    =================================== -->

    <div id="ybdPageLoader">

        <div
            class="spinner-border text-success"
            role="status">

            <span class="visually-hidden">

                Loading...

            </span>

        </div>

    </div>

    <!-- ==================================
         SUCCESS TOAST
    =================================== -->

    <div class="toast align-items-center border-0"
         id="ybdToast"
         role="alert"
         aria-live="assertive"
         aria-atomic="true">

        <div class="d-flex">

            <div class="toast-body">

                <i class="bi bi-check-circle-fill me-2"></i>

                <span id="ybdToastMessage">

                    Welcome to YOVI! Your buyer account is now ready.

                </span>

            </div>

            <button type="button"
                    class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"
                    aria-label="Close">

            </button>

        </div>

    </div>

</section>

<!-- ==========================================
     BOOTSTRAP JAVASCRIPT
=========================================== -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ==========================================
     GLOBAL JAVASCRIPT
=========================================== -->

<script src="../assets/js/buyer-done.js"></script>


</body>

</html>
