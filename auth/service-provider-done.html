<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Required Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Service Provider Setup Complete | YOVI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Global CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">

</head>

<body>

<section id="yspdDonePage">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-xl-6 col-lg-7 col-md-9 col-12">

                <!-- ==========================================
                     BRAND PLACEHOLDER
                =========================================== -->

                <div class="yspd-brand-wrapper text-center">

                    <a href="index.html" class="yspd-brand-link">

                        <div class="yspd-brand-placeholder">

                            <!--
                                Replace this placeholder
                                with your logo image later.

                                Example:

                                <img src="assets/images/logo.png"
                                     alt="Brand Logo"
                                     class="img-fluid">
                            -->

                        </div>

                    </a>

                </div>

                <!-- ==========================================
                     SUCCESS ICON
                =========================================== -->

                <div class="yspd-success-illustration text-center">

                    <div class="yspd-success-image-placeholder">

                        <!-- Replace with your image later -->

                        <i class="bi bi-tools"></i>

                    </div>

                </div>

                <!-- ==========================================
                     SUCCESS BADGE
                =========================================== -->

                <div class="text-center">

                    <div class="yspd-success-badge">

                        <i class="bi bi-check-circle-fill me-2"></i>

                        <span>Account setup complete</span>

                    </div>

                </div>

                <!-- ==========================================
                     PAGE HEADER
                =========================================== -->

                <header class="yspd-header text-center">

                    <h1 class="yspd-title">

                        You're open for bookings!

                    </h1>

                    <p class="yspd-subtitle">

                        Clients near you can now discover and book your
                        services on YOVI.

                    </p>

                </header>

                <!-- ==========================================
                     SUCCESS CARD
                =========================================== -->

                <div class="yspd-success-card">

                    <div class="card border-0 yspd-card-body">

                        <div class="card-body">

                            <!-- ==================================
                                 STATUS FEATURES
                            =================================== -->

                            <div class="row g-4 text-center yspd-feature-row">

                                <!-- Escrow -->

                                <div class="col-4">

                                    <div class="yspd-feature-item">

                                        <div class="yspd-feature-icon yspd-feature-green">

                                            <i class="bi bi-shield-check"></i>

                                        </div>

                                        <h6 class="yspd-feature-title">

                                            Escrow active

                                        </h6>

                                    </div>

                                </div>

                                <!-- Profile -->

                                <div class="col-4">

                                    <div class="yspd-feature-item">

                                        <div class="yspd-feature-icon yspd-feature-blue">

                                            <i class="bi bi-check2-circle"></i>

                                        </div>

                                        <h6 class="yspd-feature-title">

                                            Profile created

                                        </h6>

                                    </div>

                                </div>

                                <!-- Alerts -->

                                <div class="col-4">

                                    <div class="yspd-feature-item">

                                        <div class="yspd-feature-icon yspd-feature-purple">

                                            <i class="bi bi-bell"></i>

                                        </div>

                                        <h6 class="yspd-feature-title">

                                            Alerts ready

                                        </h6>

                                    </div>

                                </div>

                            </div>

                            <!-- ==================================
                                 PRIMARY BUTTON
                            =================================== -->

                            <div class="d-grid mt-4">

                                <button
                                    type="button"
                                    id="yspdAvailabilityBtn"
                                    class="btn yspd-btn-primary">

                                    <span>

                                        Set Availability

                                    </span>

                                    <i class="bi bi-arrow-right ms-2"></i>

                                </button>

                            </div>

                            <!-- ==================================
                                 SECONDARY BUTTON
                            =================================== -->

                            <div class="d-grid mt-3">

                                <a href="../provider/provider-dashboard.html">

                                <button
                                    type="button"
                                    id="yspdDashboardBtn"
                                    class="btn yspd-btn-outline">

                                    <span>

                                        View Dashboard

                                    </span>

                                    <i class="bi bi-arrow-right ms-2"></i>

                                </button>

                                </a>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- ==========================================
                     FOOTER NAVIGATION
                =========================================== -->

                <div class="yspd-footer-links">

                    <a href="../index.html">

                    <button
                        type="button"
                        id="yspdBackHomeBtn"
                        class="yspd-footer-link">

                        <i class="bi bi-arrow-left me-1"></i>

                        Back to Home

                    </button>

                    </a>

                    <span class="yspd-footer-divider">

                        •

                    </span>

                    <button
                        type="button"
                        id="yspdNotificationBtn"
                        class="yspd-footer-link">

                        View Notifications

                    </button>

                </div>

                <!-- ==========================================
                     HIDDEN DATA
                     (Used by JavaScript)
                =========================================== -->

                <input
                    type="hidden"
                    id="yspdAccountStatus"
                    value="completed">

                <input
                    type="hidden"
                    id="yspdUserRole"
                    value="service-provider">

                <input
                    type="hidden"
                    id="yspdNextPage"
                    value="service-provider-dashboard.html">

                <input
                    type="hidden"
                    id="yspdAvailabilityPage"
                    value="availability.html">

            </div>

        </div>

    </div>

</section>

<!-- ==========================================
     PAGE LOADER
========================================== -->

<div id="yspdPageLoader" class="yspd-page-loader">

    <div class="spinner-border text-success" role="status">

        <span class="visually-hidden">

            Loading...

        </span>

    </div>

</div>

<!-- ==========================================
     SUCCESS TOAST
========================================== -->

<div
    id="yspdToast"
    class="toast align-items-center border-0 yspd-toast"
    role="alert"
    aria-live="assertive"
    aria-atomic="true">

    <div class="d-flex">

        <div
            id="yspdToastMessage"
            class="toast-body">

            Success

        </div>

        <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Close">

        </button>

    </div>

</div>

<!-- ==========================================
     CONFETTI CONTAINER
     (Used for celebration animation)
========================================== -->

<div
    id="yspdConfettiContainer"
    class="yspd-confetti-container">

</div>

<!-- ==========================================
     JAVASCRIPT
========================================== -->

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Global JavaScript -->

<script src="../assets/js/service-provider-done.js"></script>

</body>
</html>
